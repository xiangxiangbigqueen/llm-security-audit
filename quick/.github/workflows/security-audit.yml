# GitHub Actions CI/CD 配置文件
# 每次 push 自动触发安全审计扫描

name: Security Audit CI/CD

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  schedule:
    # 每周日凌晨2点自动扫描
    - cron: "0 2 * * 0"

jobs:
  security-audit:
    name: LLM Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: 安装依赖
        run: |
          pip install -r requirements.txt
          pip install tree-sitter tree-sitter-python

      - name: 运行安全审计（快速模式）
        run: |
          python main.py --target . --quick --output ci-reports
        continue-on-error: true

      - name: 上传审计报告
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-report
          path: ci-reports/
          retention-days: 30

      - name: 生成审计摘要
        run: |
          echo "## 🔒 安全审计结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for f in ci-reports/*.json; do
            if [ -f "$f" ]; then
              echo "报告文件: $f" >> $GITHUB_STEP_SUMMARY
              python -c "
import json
with open('$f') as fp:
    data = json.load(fp)
summary = data.get('summary', {})
print(f'| 指标 | 数值 |')
print(f'|------|------|')
print(f'| 总发现数 | {summary.get(\"total_findings\", 0)} |')
print(f'| 高危 | {summary.get(\"by_severity\", {}).get(\"高危\", 0)} |')
print(f'| 中危 | {summary.get(\"by_severity\", {}).get(\"中危\", 0)} |')
print(f'| 扫描文件数 | {summary.get(\"scan_stats\", {}).get(\"files_scanned\", 0)} |')
" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: 检查严重漏洞
        run: |
          python -c "
import json, glob, sys
for f in glob.glob('ci-reports/*.json'):
    with open(f) as fp:
        data = json.load(fp)
    critical = data.get('summary', {}).get('by_severity', {}).get('高危', 0)
    if critical > 0:
        print(f'::warning::发现 {critical} 个高危漏洞，请及时修复')
        print(f'::error::安全审计发现 {critical} 个高危漏洞')
"
